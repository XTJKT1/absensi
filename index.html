<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Absensi NFC</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1d2129;
    --line:#2a2e38;
    --text:#eef0f4;
    --muted:#8b919d;
    --hadir:#3ddc84;
    --hadir-bg:#143324;
    --telat:#ff5c5c;
    --telat-bg:#3a1414;
    --pulang:#4d8cff;
    --pulang-bg:#10203a;
    --accent:#ffb648;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
  }
  header{
    padding:28px clamp(16px,4vw,48px) 18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid var(--line);
  }
  .brand-eyebrow{
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-size:clamp(22px,3vw,30px);
    font-weight:700;
  }
  .clock{
    text-align:right;
    color:var(--muted);
    font-size:14px;
  }
  .clock span{
    display:block;
    font-size:clamp(20px,3vw,26px);
    color:var(--text);
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  main{
    padding:24px clamp(16px,4vw,48px) 60px;
    max-width:1100px;
    margin:0 auto;
  }
  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px;
    margin-bottom:24px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
  }
  .stat .num{
    font-size:28px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .stat .label{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-top:4px;
  }
  .stat.hadir .num{color:var(--hadir);}
  .stat.telat .num{color:var(--telat);}
  .stat.pulang .num{color:var(--pulang);}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
  }
  .panel-head{
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .panel-head h2{
    font-size:15px;
    font-weight:600;
  }
  .live-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--hadir);
    display:inline-block;
    margin-right:6px;
    box-shadow:0 0 0 0 rgba(61,220,132,.6);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,.55);}
    70%{box-shadow:0 0 0 7px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }
  .live-label{font-size:12px;color:var(--muted);}

  table{
    width:100%;
    border-collapse:collapse;
  }
  thead th{
    text-align:left;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:var(--muted);
    padding:10px 20px;
    border-bottom:1px solid var(--line);
  }
  tbody td{
    padding:13px 20px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.row-new{
    animation:flashin .9s ease;
  }
  @keyframes flashin{
    0%{background:rgba(255,255,255,.08);}
    100%{background:transparent;}
  }
  .person-name{font-weight:600;}

  .badge{
    display:inline-block;
    padding:4px 11px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
  }
  .badge.hadir{background:var(--hadir-bg);color:var(--hadir);}
  .badge.telat{background:var(--telat-bg);color:var(--telat);}
  .badge.pulang{background:var(--pulang-bg);color:var(--pulang);}
  .badge.lain{background:var(--panel-2);color:var(--muted);}

  .empty{
    padding:50px 20px;
    text-align:center;
    color:var(--muted);
  }

  /* ===================== POPUP OVERLAY TENGAH ===================== */
  #overlayBackdrop{
    position:fixed;
    inset:0;
    background:rgba(5,6,9,.72);
    backdrop-filter:blur(4px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    padding:20px;
  }
  #overlayBackdrop.show{
    opacity:1;
    pointer-events:auto;
  }
  .overlay-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:26px;
    padding:36px 40px 32px;
    width:100%;
    max-width:360px;
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,.55);
    border-top:6px solid var(--hadir);
    transform:scale(.85) translateY(10px);
    opacity:0;
    transition:transform .32s cubic-bezier(.34,1.56,.64,1), opacity .25s ease;
  }
  #overlayBackdrop.show .overlay-card{
    transform:scale(1) translateY(0);
    opacity:1;
  }
  .overlay-card.telat{border-top-color:var(--telat);}
  .overlay-card.pulang{border-top-color:var(--pulang);}

  .overlay-photo{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 20px;
    display:block;
    border:4px solid var(--panel-2);
  }
  .overlay-photo-fallback{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:0 auto 20px;
    background:var(--panel-2);
    border:4px solid var(--panel-2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    font-weight:700;
    color:var(--accent);
  }

  .overlay-status{
    display:inline-block;
    padding:6px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:14px;
  }
  .overlay-status.hadir{background:var(--hadir-bg);color:var(--hadir);}
  .overlay-status.telat{background:var(--telat-bg);color:var(--telat);}
  .overlay-status.pulang{background:var(--pulang-bg);color:var(--pulang);}

  .overlay-nama{
    font-size:26px;
    font-weight:800;
    margin-bottom:6px;
  }
  .overlay-kelas{
    font-size:15px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .overlay-waktu{
    font-size:14px;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }

  @media (max-width:640px){
    thead{display:none;}
    table, tbody, tr, td{display:block;width:100%;}
    tbody tr{padding:12px 20px;}
    tbody td{border:none;padding:3px 0;}
    tbody td:first-child{font-weight:700;font-size:15px;}
  }
</style>
</head>
<body>

<!-- Popup overlay foto saat tap -->
<div id="overlayBackdrop">
  <div class="overlay-card" id="overlayCard">
    <img id="overlayPhoto" class="overlay-photo" style="display:none;">
    <div id="overlayPhotoFallback" class="overlay-photo-fallback" style="display:none;"></div>
    <div class="overlay-status" id="overlayStatus">-</div>
    <div class="overlay-nama" id="overlayNama">-</div>
    <div class="overlay-kelas" id="overlayKelas">-</div>
    <div class="overlay-waktu" id="overlayWaktu">-</div>
  </div>
</div>

<header>
  <div>
    <div class="brand-eyebrow">Sistem Tap Kartu</div>
    <h1>Dashboard Absensi</h1>
  </div>
  <div class="clock">
    Waktu sekarang
    <span id="liveClock">--:--:--</span>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat hadir">
      <div class="num" id="countHadir">0</div>
      <div class="label">Tepat Waktu</div>
    </div>
    <div class="stat telat">
      <div class="num" id="countTelat">0</div>
      <div class="label">Telat</div>
    </div>
    <div class="stat pulang">
      <div class="num" id="countPulang">0</div>
      <div class="label">Pulang</div>
    </div>
    <div class="stat">
      <div class="num" id="countTotal">0</div>
      <div class="label">Total Tap</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>Riwayat Tap Terbaru</h2>
      <div class="live-label"><span class="live-dot"></span>Live</div>
    </div>
    <div id="tableWrap">
      <div class="empty">Menunggu data tap kartu...</div>
    </div>
  </div>

</main>

<script>
// =======================================================
// GANTI URL INI dengan URL Web App Apps Script kamu
// =======================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwxlaUFpTALZ22RLQfy29BZ5Aw7HOD5NlWx1nybitVAXUhYipxlADz6Q5L3Q1oArGRI/exec";

const POLL_INTERVAL_MS = 4000;   // seberapa sering cek data baru
const OVERLAY_DURATION_MS = 4500; // berapa lama popup tampil sebelum hilang otomatis

let knownCount = 0;
let firstLoad = true;
let overlayTimer = null;

function statusKey(status){
  const s = (status || "").toLowerCase();
  if(s.includes("telat")) return "telat";
  if(s.includes("pulang")) return "pulang";
  if(s.includes("tepat")) return "hadir";
  return "lain";
}

function statusLabel(status){
  return status || "-";
}

function initials(nama){
  if(!nama) return "?";
  const parts = String(nama).trim().split(/\s+/);
  if(parts.length === 1) return parts[0].substring(0,2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function renderTable(rows){
  const wrap = document.getElementById("tableWrap");

  if(!rows.length){
    wrap.innerHTML = '<div class="empty">Menunggu data tap kartu...</div>';
    return;
  }

  const recent = rows.slice(-30).reverse();

  let html = `
    <table>
      <thead>
        <tr>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Waktu</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
  `;

  recent.forEach((r, idx) => {
    const key = statusKey(r.status);
    const isNew = !firstLoad && idx === 0;
    html += `
      <tr class="${isNew ? 'row-new' : ''}">
        <td><span class="person-name">${escapeHtml(r.nama)}</span></td>
        <td>${escapeHtml(r.kelas)}</td>
        <td>${escapeHtml(r.waktu)}</td>
        <td><span class="badge ${key}">${escapeHtml(statusLabel(r.status))}</span></td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  wrap.innerHTML = html;
}

function updateStats(rows){
  let hadir = 0, telat = 0, pulang = 0;
  rows.forEach(r => {
    const key = statusKey(r.status);
    if(key === "hadir") hadir++;
    else if(key === "telat") telat++;
    else if(key === "pulang") pulang++;
  });
  document.getElementById("countHadir").textContent = hadir;
  document.getElementById("countTelat").textContent = telat;
  document.getElementById("countPulang").textContent = pulang;
  document.getElementById("countTotal").textContent = rows.length;
}

// ===================== POPUP OVERLAY =====================
function showOverlay(row){
  const key = statusKey(row.status);

  const backdrop = document.getElementById("overlayBackdrop");
  const card = document.getElementById("overlayCard");
  const photo = document.getElementById("overlayPhoto");
  const photoFallback = document.getElementById("overlayPhotoFallback");

  // Reset class status di kartu
  card.classList.remove("telat", "pulang");
  if(key === "telat") card.classList.add("telat");
  else if(key === "pulang") card.classList.add("pulang");

  // Foto / fallback inisial
  if(row.foto){
    photo.src = row.foto;
    photo.style.display = "block";
    photoFallback.style.display = "none";
    photo.onerror = () => {
      photo.style.display = "none";
      photoFallback.style.display = "flex";
      photoFallback.textContent = initials(row.nama);
    };
  } else {
    photo.style.display = "none";
    photoFallback.style.display = "flex";
    photoFallback.textContent = initials(row.nama);
  }

  document.getElementById("overlayStatus").textContent = statusLabel(row.status);
  document.getElementById("overlayStatus").className = `overlay-status ${key}`;
  document.getElementById("overlayNama").textContent = row.nama || "-";
  document.getElementById("overlayKelas").textContent = row.kelas || "-";
  document.getElementById("overlayWaktu").textContent = row.waktu || "-";

  backdrop.classList.add("show");

  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(hideOverlay, OVERLAY_DURATION_MS);
}

function hideOverlay(){
  document.getElementById("overlayBackdrop").classList.remove("show");
}

// klik di luar kartu untuk tutup manual
document.getElementById("overlayBackdrop").addEventListener("click", (e) => {
  if(e.target.id === "overlayBackdrop"){
    clearTimeout(overlayTimer);
    hideOverlay();
  }
});

// ===================== FETCH DATA =====================
async function fetchData(){
  try{
    const res = await fetch(API_URL, { cache: "no-store" });
    const rows = await res.json();

    if(!Array.isArray(rows)) return;

    renderTable(rows);
    updateStats(rows);

    if(firstLoad){
      knownCount = rows.length;
      firstLoad = false;
      return;
    }

    if(rows.length > knownCount){
      const newRows = rows.slice(knownCount);
      // tampilkan popup untuk tap terbaru (yang paling akhir jika ada beberapa)
      showOverlay(newRows[newRows.length - 1]);
      knownCount = rows.length;
    } else if(rows.length < knownCount){
      knownCount = rows.length;
    }

  }catch(err){
    console.error("Gagal mengambil data absensi:", err);
  }
}

function tickClock(){
  const now = new Date();
  document.getElementById("liveClock").textContent =
    now.toLocaleTimeString("id-ID", { hour12:false });
}

tickClock();
setInterval(tickClock, 1000);

fetchData();
setInterval(fetchData, POLL_INTERVAL_MS);
</script>

</body>
</html>
