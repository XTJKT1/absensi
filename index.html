<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scan Kartu Siswa</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
}

.card{
    background:white;
    border-radius:30px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.title{
    font-size:32px;
    font-weight:bold;
    color:#6c3cff;
    margin-bottom:15px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

.photo{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:8px solid #6c3cff;
    margin:auto;
    display:none;
}

.nama{
    font-size:30px;
    font-weight:bold;
    color:#333;
    margin-top:20px;
}

.kelas{
    font-size:22px;
    color:#666;
    margin-top:8px;
}

.status{
    margin-top:20px;
    padding:12px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
}

.hadir{
    background:#d4f8d4;
    color:#008000;
}

.tidak{
    background:#ffd6d6;
    color:#d00000;
}

.scan-box{
    margin-top:25px;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border-radius:15px;
    border:2px solid #ddd;
    text-align:center;
}

.footer{
    margin-top:15px;
    color:#888;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="title">🎓 Scan Kartu Siswa</div>
        <div class="subtitle">
            Tempelkan kartu untuk menampilkan data
        </div>

        <img id="foto" class="photo">

        <div id="nama" class="nama">Menunggu Scan...</div>

        <div id="kelas" class="kelas"></div>

        <div id="status"></div>

        <div class="scan-box">
            <input
                type="text"
                id="uid"
                placeholder="Scan kartu..."
                autofocus
            >
        </div>

        <div class="footer">
            RFID / NFC Attendance System
        </div>

    </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwca-F5VZTaE_CpAQfmzucvG1AHJ5ItJtcMbCZyK43zLTU5ng3jKNIUFf4uIpTtobgd/exec";

const uidInput = document.getElementById("uid");

uidInput.addEventListener("change", scanCard);

async function scanCard(){

    const uid = uidInput.value.trim();

    if(!uid) return;

    try{

        const response = await fetch(
            `${API_URL}?uid=${encodeURIComponent(uid)}`
        );

        const data = await response.json();

        /*
        Format JSON dari Apps Script:

        {
          "status":"Hadir",
          "nama":"Budi",
          "kelas":"XII IPA 1",
          "foto":"https://....jpg"
        }
        */

        document.getElementById("nama").innerText =
            data.nama || "Tidak ditemukan";

        document.getElementById("kelas").innerText =
            data.kelas || "";

        const foto = document.getElementById("foto");

        if(data.foto){
            foto.src = data.foto;
            foto.style.display = "block";
        }else{
            foto.style.display = "none";
        }

        const statusDiv =
            document.getElementById("status");

        statusDiv.innerText =
            data.status || "";

        if(
            String(data.status)
            .toLowerCase()
            .includes("hadir")
        ){
            statusDiv.className =
                "status hadir";
        }else{
            statusDiv.className =
                "status tidak";
        }

    }catch(err){

        document.getElementById("nama")
            .innerText = "❌ Gagal mengambil data";

        console.error(err);
    }

    uidInput.value = "";
    uidInput.focus();
}

setInterval(()=>{
    uidInput.focus();
},1000);

</script>

</body>
</html>
