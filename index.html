<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Display Absensi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      font-family: 'Poppins', sans-serif;
      overflow:hidden;
    }

    .glass{
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.1);
    }

    .animate-card{
      animation: popup 0.5s ease;
    }

    @keyframes popup{
      from{
        transform: scale(0.7);
        opacity:0;
      }
      to{
        transform: scale(1);
        opacity:1;
      }
    }
  </style>
</head>

<body class="text-white h-screen p-5">

  <div class="flex justify-between items-center mb-5">
    <div>
      <h1 class="text-4xl font-bold">
        DISPLAY ABSENSI
      </h1>
      <div class="flex items-center gap-4 mt-1">
        <p class="text-gray-300">
          Sistem Absensi Realtime
        </p>
        <nav class="flex gap-2">
          <a href="monitor.html" class="glass px-3 py-1 rounded-lg text-xs font-semibold hover:bg-white/20 transition-all border border-white/10">🖥️ Monitor</a>
          <a href="register.html" class="glass px-3 py-1 rounded-lg text-xs font-semibold hover:bg-white/20 transition-all border border-white/10">📝 Registrasi</a>
        </nav>
      </div>
    </div>

    <div id="clock" class="text-4xl font-bold"></div>
  </div>

  <div id="latestCard"
       class="glass rounded-3xl p-10 text-center mb-5 animate-card">

      <h2 class="text-2xl text-gray-300">
        Menunggu Absensi...
      </h2>
  </div>

  <div class="glass rounded-3xl p-5 h-[55vh] overflow-auto">
    <h2 class="text-2xl font-bold mb-5">
      Riwayat Absensi
    </h2>

    <table class="w-full">
      <thead>
        <tr class="text-left border-b border-gray-600">
          <th class="p-3">Nama</th>
          <th class="p-3">Kelas</th>
          <th class="p-3">Waktu</th>
          <th class="p-3">Status</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// --- Masukkan firebaseConfig Anda di sini ---
const firebaseConfig = {
  apiKey: "AIzaSyBwgMx37DDpK6tT5OJgYvjXFJWjCcAPnl0",
  authDomain: "absensi-e4d2c.firebaseapp.com",
  databaseURL: "https://absensi-e4d2c-default-rtdb.firebaseio.com",
  projectId: "absensi-e4d2c",
  storageBucket: "absensi-e4d2c.firebasestorage.app",
  messagingSenderId: "758152976558",
  appId: "1:758152976558:web:5b4ff797c5f70aedde353f",
  measurementId: "G-WQDWLMH3GB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let lastDataLength = 0;

function updateClock(){
  const now = new Date();

  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("id-ID");
}

setInterval(updateClock,1000);

function welcomeUser(name){

  const speech = new SpeechSynthesisUtterance(
    `Selamat datang ${name}`
  );

  speech.lang = "id-ID";
  speech.rate = 0.9;

  window.speechSynthesis.speak(speech);
}

const attendanceRef = query(ref(db, 'absensi'), limitToLast(20));

onValue(attendanceRef, (snapshot) => {
    const rawData = snapshot.val();
    if (!rawData) return;

    // Konversi objek Firebase ke Array dan urutkan terbaru di atas
    const data = Object.keys(rawData).map(key => rawData[key]).reverse();
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    data.forEach((item,index)=>{
      tableBody.innerHTML += `
        <tr class="border-b border-gray-700">
          <td class="p-3">${item.nama}</td>
          <td class="p-3">${item.kelas}</td>
          <td class="p-3">${item.waktu}</td>
          <td class="p-3 text-green-400 font-bold">HADIR</td>
        </tr>
      `;

      if(index === 0){

        document.getElementById("latestCard").innerHTML = `
          <div class="animate-card">
            <h1 class="text-5xl font-bold mb-3">
              ${item.nama}
            </h1>

            <p class="text-2xl text-blue-300">
              ${item.kelas}
            </p>

            <div class="mt-5 text-green-400 text-3xl font-bold">
              HADIR
            </div>
          </div>
        `;
      }
    });

    if(data.length > lastDataLength){

      const latest = data[0];

      welcomeUser(latest.nama);

      lastDataLength = data.length;
    }
});

</script>

</body>
</html>
